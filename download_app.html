<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбор устройства</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
            touch-action: pan-y;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 36px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            max-width: 480px;
            width: 100%;
            padding: 32px 24px;
            text-align: center;
            animation: fadeSlide 0.4s ease-out;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-header {
            font-size: 52px;
            margin-bottom: 16px;
            filter: drop-shadow(0 8px 12px rgba(79, 70, 229, 0.4));
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #334155;
            margin-bottom: 32px;
            font-weight: 400;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            line-height: 1.4;
        }

        .device-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 28px;
        }

        .device-btn {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 100px;
            padding: 16px 24px;
            text-decoration: none;
            color: #0f172a;
            transition: all 0.25s ease;
            box-shadow: 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .device-btn:active {
            transform: scale(0.98);
        }

        .device-btn.android {
            border-color: #3b82f6;
            background: linear-gradient(145deg, #ffffff, #f0f9ff);
        }

        .device-btn.ios {
            border-color: #000000;
            background: linear-gradient(145deg, #ffffff, #f5f5f7);
        }

        .device-btn.ios .device-icon {
            color: #000000;
        }

        .device-icon {
            font-size: 36px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.2);
        }

        .device-info {
            flex: 1;
            text-align: left;
        }

        .device-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .device-desc {
            font-size: 0.9rem;
            color: #475569;
        }

        .arrow-icon {
            font-size: 24px;
            color: #94a3b8;
            transition: transform 0.2s;
        }

        .device-btn:hover .arrow-icon {
            transform: translateX(6px);
        }

        

        

        .footer-note {
            font-size: 0.85rem;
            color: #64748b;
            background: #f1f5f9;
            padding: 14px 18px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }

        .footer-note i {
            color: #4f46e5;
            font-size: 1rem;
        }

        hr {
            border: none;
            border-top: 2px dashed #cbd5e1;
            margin: 24px 0 16px;
        }

        .back-link {
            display: inline-block;
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 8px 24px;
            border-radius: 40px;
            background: #eef2ff;
            transition: background 0.2s;
        }

        .back-link:hover {
            background: #e0e7ff;
        }

        /* мини блокировка масштабирования */
        @media (max-width: 400px) {
            .card {
                padding: 24px 18px;
            }

            .device-icon {
                width: 48px;
                height: 48px;
                font-size: 30px;
                margin-right: 12px;
            }

            .device-name {
                font-size: 1.3rem;
            }
        }

        /* предотвращение зума на iOS */
        input,
        select,
        textarea,
        button {
            font-size: 16px;
        }

        body,
        html {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
    </style>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="card">

        <h1>Выберите устройство</h1>
        <div class="subtitle">
              <br> 
        </div>

        <div class="device-grid">
            <!-- Android -->
            <a href="https://nof7351.github.io/V/download_app/android" class="device-btn android" target="_blank"
                rel="noopener noreferrer">
                <div class="device-icon">
                    <i class="fab fa-android" style="color: #3b82f6;"></i>
                </div>
                <div class="device-info">
                    <div class="device-name">Android</div>
                    <div class="device-desc">Загрузка файла через APK</div>
                </div>
                <div class="arrow-icon">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>

            <!-- iOS (iPhone / iPad) -->
            <a href="https://nof7351.github.io/V/download_app/ios.mp4" class="device-btn ios" target="_blank"
                rel="noopener noreferrer">
                <div class="device-icon">
                    <i class="fab fa-apple" style="color: #000;"></i>
                </div>
                <div class="device-info">
                    <div class="device-name">iOS</div>
                    <div class="device-desc">Добавление сайта на "экран домой"</div>
                </div>
                <div class="arrow-icon">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </a>
        </div>

        

        <hr>

        <!-- ссылка на главную страницу (если нужно вернуться) -->
        <a href="https://nof7351.github.io/V/Home" class="back-link" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-arrow-left" style="margin-right: 6px;"></i> Назад
        </a>
        
    </div>

    <!-- Блокировка случайного масштабирования (жесты) -->
    <script>
        (function () {
            // Запрет масштабирования двумя пальцами (touch)
            document.addEventListener('touchmove', function (event) {
                if (event.scale !== 1) { event.preventDefault(); }
            }, { passive: false });

            // Блокировка жеста pinch/zoom
            document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
            document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
            document.addEventListener('gestureend', function (e) { e.preventDefault(); });

            // Предотвращение двойного тапа в зум (для iOS)
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function (event) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);

            // Запрет выделения текста (уже в css, но для надежности)
            document.addEventListener('selectstart', function (e) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                }
            });

            // Отключаем контекстное меню на всей странице (кроме полей ввода, их нет)
            document.addEventListener('contextmenu', function (e) {
                e.preventDefault();
                return false;
            });
        })();
    </script>
</body>

</html>
